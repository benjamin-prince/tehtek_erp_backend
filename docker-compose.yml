services:
  db:
    image: postgres:16
    container_name: tehtek_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tehtek
      POSTGRES_USER: tehtek
      POSTGRES_PASSWORD: tehtek_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: tehtek_backend
    container_name: tehtek_backend
    restart: unless-stopped
    depends_on:
      - db
    expose:
      - "8000"
    env_file:
      - .env

  caddy:
    image: caddy:latest
    container_name: tehtek_caddy
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config: